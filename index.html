<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Realm</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
if(window.Pi){
 Pi.init({version:"2.0"});
}
</script>

<style>
body{background:#0a1020;color:white;font-family:Arial;margin:0;padding:20px}
button{padding:12px 20px;margin:10px 0;border-radius:10px;border:none;background:#2f6bff;color:white;font-size:16px;width:100%}
.card{background:#141c33;padding:16px;border-radius:12px;margin-bottom:16px}
</style>

</head>
<body>

<h1>Idle Realm</h1>

<button id="piLogin">🔐 Login with Pi</button>

<button id="piDonate" style="display:none">
💎 Support the Realm (0.1 Pi)
</button>

<div id="game" class="card">
Game running...
</div>

<script>

/* =============================
PI USER STATE
============================= */

let piUser=null

try{
 const saved=JSON.parse(localStorage.getItem("piUser"))
 if(saved && saved.uid) piUser=saved
}catch{}

/* =============================
LOGIN
============================= */

const piLoginBtn=document.getElementById("piLogin")

if(piLoginBtn && window.Pi){

 if(piUser){
   piLoginBtn.style.display="none"
 }

 piLoginBtn.onclick=async()=>{

   try{

     const auth=await Pi.authenticate(
       ["username","payments"],
       payment=>console.log("Incomplete payment",payment)
     )

     piUser={
       uid:auth.user.uid,
       username:auth.user.username
     }

     localStorage.setItem("piUser",JSON.stringify(piUser))

     piLoginBtn.style.display="none"

     const donateBtn=document.getElementById("piDonate")
     if(donateBtn) donateBtn.style.display="block"

     console.log("Authenticated as",piUser.username)

     checkPendingPayments()

   }catch(e){

     console.error("Pi auth failed",e)

   }

 }

}

/* =============================
RECOVER PENDING PAYMENTS
============================= */

async function checkPendingPayments(){

 if(!window.Pi || !Pi.getIncompleteServerPayments) return

 try{

   const payments=await Pi.getIncompleteServerPayments()

   for(const p of payments){

     await fetch("/api/pi",{
       method:"POST",
       headers:{
        "Content-Type":"application/json"
       },
       body:JSON.stringify({
         action:"complete",
         paymentId:p.identifier,
         txid:p.transaction.txid
       })
     })

     console.log("Recovered payment",p.identifier)

   }

 }catch(e){
   console.error("Pending recovery error",e)
 }

}

/* =============================
PAYMENT BUTTON
============================= */

const donateBtn=document.getElementById("piDonate")

if(piUser && donateBtn){
 donateBtn.style.display="block"
}

if(donateBtn && window.Pi){

 donateBtn.onclick=()=>{

   console.log("Payment clicked")

   if(!piUser){
     alert("Login with Pi first")
     return
   }

   if(!window.Pi){
     alert("Open the app in Pi Browser")
     return
   }

   Pi.createPayment({

     amount:0.1,
     memo:"Support Idle Realm",

     metadata:{
       item:"realm_support",
       game:"idle_realm"
     }

   },
   {

     onReadyForServerApproval:async function(paymentId){

       try{

         await fetch("/api/pi",{
           method:"POST",
           headers:{
            "Content-Type":"application/json"
           },
           body:JSON.stringify({
             action:"approve",
             paymentId:paymentId
           })
         })

       }catch(e){
         console.error("Approval error",e)
       }

     },

     onReadyForServerCompletion:async function(paymentId,txid){

       try{

         const res=await fetch("/api/pi",{
           method:"POST",
           headers:{
            "Content-Type":"application/json"
           },
           body:JSON.stringify({
             action:"complete",
             paymentId:paymentId,
             txid:txid
           })
         })

         const data=await res.json()

         if(data.result==="completed"){
           alert("Thank you for supporting Idle Realm 💜")
         }

       }catch(e){
         console.error("Completion error",e)
       }

     },

     onCancel:function(paymentId){
       console.log("Payment cancelled",paymentId)
     },

     onError:function(error){
       console.error("Payment error",error)
     }

   })

 }

}

</script>

</body>
</html>
