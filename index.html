<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Realm</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
const Pi = window.Pi;
Pi.init({ version: "2.0" });
</script>

<style>
:root{
--card:#141c33;
--card2:#1b2546;
--accent:#2f6bff;
--bronze:#c27c2c;
--iron:#9aa0a6;
--text:#e6ecff;
--muted:#9aa4c7;
--ok:#22c55e;
}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto}
body{margin:0;background:linear-gradient(180deg,#0a1020,#050a14);color:var(--text)}
header{position:sticky;top:0;background:#060b18;padding:8px;display:flex;gap:8px;justify-content:space-between}
main{padding:16px;max-width:500px;margin:auto}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border-radius:16px;padding:16px;margin-bottom:16px}
button{width:100%;border:none;border-radius:14px;padding:14px;margin-bottom:10px;background:var(--accent);color:white;font-size:16px}
button:disabled{opacity:.4}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tile{background:#0f1730;border-radius:12px;height:70px;display:flex;align-items:center;justify-content:center;font-size:26px}
.small{font-size:13px;color:var(--muted)}
</style>
</head>

<body>

<header>
<span>👥 <b id="pop"></b></span>
<span>⚒️ <b id="prod"></b></span>
<span>🥉 <b id="bronze"></b></span>
<span>🛡️ <b id="stab"></b>%</span>
<span>⏳ <b id="time"></b></span>
</header>

<main>

<h1>Idle Realm</h1>

<button id="piLogin">🔐 Login with Pi</button>
<button id="piDonate" style="display:none">💎 Support the Realm (0.1 Pi)</button>

<div class="card">
<h2>City</h2>
<div class="grid" id="city"></div>
</div>

</main>

<script>

/* =========================
PI AUTH
========================= */

let piUser=null
const scopes=["username","payments"]

const loginBtn=document.getElementById("piLogin")
const donateBtn=document.getElementById("piDonate")

loginBtn.onclick=async()=>{

try{

const auth=await Pi.authenticate(
scopes,
payment=>console.log("Incomplete payment",payment)
)

piUser={
uid:auth.user.uid,
username:auth.user.username
}

localStorage.setItem("piUser",JSON.stringify(piUser))

loginBtn.style.display="none"
donateBtn.style.display="block"

console.log("Logged in:",piUser.username)

}catch(err){

console.error(err)

}

}

/* =========================
PI PAYMENT
========================= */

donateBtn.onclick=async()=>{

if(!piUser){
alert("Login first")
return
}

donateBtn.disabled=true

const paymentData={
amount:0.1,
memo:"Support Idle Realm",
metadata:{game:"idle_realm"}
}

const callbacks={

onReadyForServerApproval:async(paymentId)=>{

await fetch("/api/pi",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"approve",
paymentId:paymentId
})
})

},

onReadyForServerCompletion:async(paymentId,txid)=>{

await fetch("/api/pi",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"complete",
paymentId:paymentId,
txid:txid
})
})

alert("Payment completed")

donateBtn.disabled=false

},

onCancel:()=>{

donateBtn.disabled=false

},

onError:(err)=>{

console.error(err)
donateBtn.disabled=false

}

}

await Pi.createPayment(paymentData,callbacks)

}

/* =========================
GAME STATE
========================= */

const city=document.getElementById("city")

let buildings=["⚒️"]

function renderCity(){

city.innerHTML=""

for(let i=0;i<9;i++){

const tile=document.createElement("div")
tile.className="tile"
tile.textContent=buildings[i]||"⬜"

city.appendChild(tile)

}

}

renderCity()

/* =========================
GAME LOOP
========================= */

let state={
pop:12,
prod:30,
bronze:0,
stab:100,
time:0
}

function update(){

document.getElementById("pop").textContent=state.pop
document.getElementById("prod").textContent=state.prod
document.getElementById("bronze").textContent=state.bronze
document.getElementById("stab").textContent=state.stab
document.getElementById("time").textContent=state.time

}

setInterval(()=>{

state.time++

update()

},1000)

update()

</script>

</body>
</html>
