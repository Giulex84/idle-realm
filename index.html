<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Idle Realm A2U Test</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
const Pi = window.Pi
Pi.init({ version:"2.0" })
</script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
font-size:16px;
margin:10px;
border-radius:8px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Idle Realm A2U Test</h1>

<div id="user">Not logged</div>

<button id="login">Login</button>

<button id="send" disabled>
Send 0.01π Reward
</button>

<div id="status"></div>

<script>

let currentUser=null

function setStatus(msg){
document.getElementById("status").innerText=msg
}

document.getElementById("login").onclick=async()=>{

try{

const auth=await Pi.authenticate(
["username","payments","wallet_address"],
payment=>console.log(payment)
)

currentUser=auth.user

document.getElementById("user").innerText=
"Logged as "+currentUser.username

document.getElementById("send").disabled=false

}catch(e){

console.error(e)

}

}

document.getElementById("send").onclick=async()=>{

if(!currentUser)return

setStatus("Sending reward...")

try{

const r=await fetch("/api/a2u",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
uid:currentUser.uid,
amount:0.01,
memo:"Idle Realm reward"
})
})

const data=await r.json()

if(data.success){

setStatus("Payment sent! txid:"+data.txid)

}else{

setStatus("Error sending payment")

}

}catch(e){

console.error(e)

setStatus("Server error")

}

}

</script>

</body>
</html>
