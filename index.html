<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Realm</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
if(window.Pi){
 Pi.init({version:"2.0"});
}
</script>

<style>
body{margin:0;background:#0a1020;color:#e6ecff;font-family:Arial}
header{padding:10px;background:#060b18;display:flex;gap:10px;justify-content:space-around}
main{padding:20px;max-width:500px;margin:auto}
.card{background:#141c33;border-radius:16px;padding:16px;margin-bottom:16px}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#2f6bff;color:white;font-size:16px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tile{background:#0f1730;border-radius:12px;height:70px;display:flex;align-items:center;justify-content:center;font-size:26px}
</style>

</head>

<body>

<header>
<span>👥 <b id="pop"></b></span>
<span>⚒️ <b id="prod"></b></span>
<span>🥉 <b id="bronze"></b></span>
<span>🛡️ <b id="stab"></b>%</span>
<span>⏳ <b id="time"></b></span>
</header>

<main>

<h1>Idle Realm</h1>

<button id="piLogin">🔐 Login with Pi</button>

<button id="piDonate" style="display:none">
💎 Support the Realm (0.1 Pi)
</button>

<div class="card">
<h2>City</h2>
<div class="grid" id="city"></div>
</div>

</main>

<script>

/* =============================
PI USER
============================= */

let piUser=null

try{
 const savedUser=JSON.parse(localStorage.getItem("piUser"))
 if(savedUser && savedUser.uid) piUser=savedUser
}catch{}

/* =============================
GAME STATE
============================= */

const DEFAULT={
 pop:12,
 prod:30,
 bronze:0,
 stab:100,
 time:0,
 buildings:["⚒️"]
}

let state=load()

function load(){
 try{
   const s=JSON.parse(localStorage.getItem("idleRealm"))
   if(!s) throw 0
   return s
 }catch{
   return structuredClone(DEFAULT)
 }
}

function save(){
 localStorage.setItem("idleRealm",JSON.stringify(state))
}

/* =============================
GAME UPDATE
============================= */

function update(){

 pop.textContent=state.pop
 prod.textContent=state.prod.toFixed(1)
 bronze.textContent=state.bronze.toFixed(1)
 stab.textContent=Math.round(state.stab)
 time.textContent=state.time

 city.innerHTML=""

 for(let i=0;i<9;i++){

   const tile=document.createElement("div")
   tile.className="tile"

   tile.textContent=state.buildings[i] || "⬜"

   city.appendChild(tile)

 }

 save()

}

/* =============================
GAME LOOP
============================= */

setInterval(()=>{

 state.time++

 const w=state.buildings.filter(b=>b==="⚒️").length

 state.prod+=w*0.2

 update()

},1000)

/* =============================
PI LOGIN
============================= */

const piLoginBtn=document.getElementById("piLogin")

if(piLoginBtn && window.Pi){

 if(piUser){
   piLoginBtn.style.display="none"
   document.getElementById("piDonate").style.display="block"
 }

 piLoginBtn.onclick=async()=>{

   try{

     const auth=await Pi.authenticate(
      ["username","payments"],
      payment=>console.log("Incomplete payment",payment)
     )

     piUser={
       uid:auth.user.uid,
       username:auth.user.username
     }

     localStorage.setItem("piUser",JSON.stringify(piUser))

     piLoginBtn.style.display="none"

     const donateBtn=document.getElementById("piDonate")
     if(donateBtn) donateBtn.style.display="block"

     checkPendingPayments()

   }catch(e){

     console.error("Pi auth failed",e)

   }

 }

}

/* =============================
RECOVER PENDING PAYMENTS
============================= */

async function checkPendingPayments(){

 if(!window.Pi || !Pi.getIncompleteServerPayments) return

 try{

   const payments=await Pi.getIncompleteServerPayments()

   for(const p of payments){

     await fetch("/api/pi",{
       method:"POST",
       headers:{
        "Content-Type":"application/json"
       },
       body:JSON.stringify({
         action:"complete",
         paymentId:p.identifier,
         txid:p.transaction.txid
       })
     })

   }

 }catch(e){
   console.error("pending recovery error",e)
 }

}

/* =============================
PI PAYMENT
============================= */

const donateBtn=document.getElementById("piDonate")

if(donateBtn && window.Pi){

 donateBtn.onclick=()=>{

   if(!piUser){
     alert("Login with Pi first")
     return
   }

   Pi.createPayment(
   {
     amount:0.1,
     memo:"Support Idle Realm",

     metadata:{
       item:"realm_support",
       game:"idle_realm"
     }
   },
   {

     onReadyForServerApproval:async function(paymentId){

       await fetch("/api/pi",{
         method:"POST",
         headers:{
          "Content-Type":"application/json"
         },
         body:JSON.stringify({
           action:"approve",
           paymentId:paymentId
         })
       })

     },

     onReadyForServerCompletion:async function(paymentId,txid){

       const res=await fetch("/api/pi",{
         method:"POST",
         headers:{
          "Content-Type":"application/json"
         },
         body:JSON.stringify({
           action:"complete",
           paymentId:paymentId,
           txid:txid
         })
       })

       const data=await res.json()

       if(data.result==="completed"){
         alert("Thank you for supporting Idle Realm 💜")
       }

     },

     onCancel:function(paymentId){
       console.log("cancel",paymentId)
     },

     onError:function(error){
       console.error("payment error",error)
     }

   })

 }

}

/* =============================
INIT
============================= */

update()

</script>

</body>
</html>
